<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Portátiles | Microdata Informática</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
/* ==========================================================================
   VARIABLES Y CONFIGURACIÓN CORPORATIVA
   ========================================================================== */
:root {
    --primary: #ff6600;        /* Naranja corporativo Microdata */
    --primary-hover: #e05500;
    --dark: #1e2229;           /* Gris técnico oscuro */
    --light-bg: #f8f9fa;       /* Fondo limpio */
    --border-color: #e9ecef;
    --text-main: #495057;
    --text-title: #212529;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    background-color: #ffffff;
    line-height: 1.6;
    background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
    background-size: 24px 24px;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
}

/* ==========================================================================
   TOP BAR & HEADER
   ========================================================================== */
.top-bar {
    background-color: var(--dark);
    color: #ffffff;
    font-size: 0.85rem;
    padding: 10px 0;
    border-bottom: 2px solid var(--primary);
}
.top-bar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}
.top-phone {
    color: #ffffff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: bold;
}

.main-header {
    background-color: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.02);
}
.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 80px;
}
.logo {
    height: 48px;
    width: auto;
    object-fit: contain;
}
.main-nav {
    display: flex;
    align-items: center;
    gap: 32px;
}
.nav-link {
    color: var(--text-title);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: var(--transition);
}
.nav-link:hover, .nav-link.active {
    color: var(--primary);
}
.btn-header {
    background-color: var(--dark);
    color: #ffffff;
    padding: 10px 20px;
    border-radius: 6px;
}
.btn-header:hover {
    background-color: var(--primary);
    color: #ffffff;
}

/* ==========================================================================
   CATÁLOGO & TARJETAS DE PRODUCTOS
   ========================================================================== */
.page-title {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--dark);
    margin: 40px 0 30px 0;
    position: relative;
    letter-spacing: -0.5px;
}
.page-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px; 
    background-color: var(--primary);
    margin: 12px auto 0;
    border-radius: 2px;
}

.products-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 30px; 
    margin: 30px auto 60px; 
    min-height: 300px;
    position: relative;
}

.product-card { 
    background: #ffffff;
    border-radius: 12px;
    padding: 20px; 
    transition: var(--transition);
    border: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
}
.product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow);
    border-color: transparent;
}

.product-image-container { 
    width: 100%;
    height: 180px;
    border-radius: 8px; 
    overflow: hidden;
    margin-bottom: 15px;
    background-color: var(--light-bg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.product-image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.product-card h3 {
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 8px;
    min-height: 2.6em;
    line-height: 1.3;
}

.product-price {
    color: var(--primary);
    font-weight: 800;
    font-size: 1.4rem;
    margin: 10px 0 15px 0;
    display: block;
}

.card-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
}

.btn-buy, .btn-details { 
    flex: 1;
    padding: 10px 12px;
    text-align: center; 
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.85rem;
    transition: var(--transition);
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-buy {
    background: var(--dark);
    color: #ffffff;
}
.btn-buy:hover {
    background: var(--primary-hover);
}

.btn-details {
    background: var(--primary);
    color: #ffffff;
}
.btn-details:hover {
    background: var(--primary-hover);
}

/* CARGANDO / SPINNER */
.loading-wrapper {
    grid-column: 1 / -1;
    text-align: center;
    font-weight: 700;
    color: var(--primary);
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 60px 0;
    animation: pulse-animation 1.5s infinite;
}
@keyframes pulse-animation {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;

    background: rgba(3
