<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
/* ==========================================================================
   VARIABLES Y CONFIGURACIÓN CORPORATIVA
   ========================================================================== */
:root {
    --primary: #ff6600;        /* Naranja corporativo Microdata */
    --primary-hover: #e05500;
    --dark: #1e2229;            /* Gris técnico oscuro */
    --light-bg: #f8f9fa;       /* Fondo limpio */
    --border-color: #e9ecef;
    --text-main: #495057;
    --text-title: #212529;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    background-color: #ffffff;
    line-height: 1.6;
    background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
    background-size: 24px 24px;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
}

/* ==========================================================================
   TOP BAR & HEADER
   ========================================================================== */
.top-bar {
    background-color: var(--dark);
    color: #ffffff;
    font-size: 0.85rem;
    padding: 10px 0;
    border-bottom: 2px solid var(--primary);
}
.top-bar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}
.top-phone {
    color: #ffffff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: bold;
}

.main-header {
    background-color: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.02);
}
.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 80px;
}
.logo {
    height: 48px;
    width: auto;
    object-fit: contain;
}
.main-nav {
    display: flex;
    align-items: center;
    gap: 32px;
}
.nav-link {
    color: var(--text-title);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: var(--transition);
}
.nav-link:hover, .nav-link.active {
    color: var(--primary);
}

/* ==========================================================================
   CATÁLOGO & TARJETAS DE PRODUCTOS
   ========================================================================== */
.page-title {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--dark);
    margin: 40px 0 30px 0;
    position: relative;
    letter-spacing: -0.5px;
}
.page-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px; 
    background-color: var(--primary);
    margin: 12px auto 0;
    border-radius: 2px;
}

.products-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 30px; 
    margin: 30px auto 60px; 
    min-height: 300px;
    position: relative;
}

.product-card { 
    background: #ffffff;
    border-radius: 12px;
    padding: 20px; 
    transition: var(--transition);
    border: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
}
.product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow);
    border-color: transparent;
}

.product-image-container { 
    width: 100%;
    height: 180px;
    border-radius: 8px; 
    overflow: hidden;
    margin-bottom: 15px;
    background-color: var(--light-bg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.product-image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.product-card h3 {
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 8px;
    min-height: 2.6em;
    line-height: 1.3;
}

.product-price {
    color: var(--primary);
    font-weight: 800;
    font-size: 1.4rem;
    margin: 10px 0 15px 0;
    display: block;
}

.card-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
}

.btn-buy, .btn-details { 
    flex: 1;
    padding: 10px 12px;
    text-align: center; 
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.85rem;
    transition: var(--transition);
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-buy {
    background: var(--dark);
    color: #ffffff;
}
.btn-buy:hover {
    background: var(--primary-hover);
}

.btn-details {
    background: var(--primary);
    color: #ffffff;
}
.btn-details:hover {
    background: var(--primary-hover);
}

/* CARGANDO / SPINNER */
.loading-wrapper {
    grid-column: 1 / -1;
    text-align: center;
    font-weight: 700;
    color: var(--primary);
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 60px 0;
    animation: pulse-animation 1.5s infinite;
}
@keyframes pulse-animation {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* MODAL DETALLES */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(30, 34, 41, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal-content {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    max-height: 90vh;
    overflow-y: auto;
}
.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    cursor: pointer;
    font-size: 28px;
    color: var(--text-main);
    font-weight: bold;
}
.modal-close:hover {
    color: var(--primary);
}
.modal-specs-list {
    margin: 20px 0;
    list-style: none;
    line-height: 1.8;
}
.modal-specs-list li {
    padding: 6px 0;
    border-bottom: 1px dashed var(--border-color);
    font-size: 0.95rem;
}
.modal-specs-list li strong {
    color: var(--dark);
}

.modal-img-container {
    width: 100%;
    height: 160px;
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--light-bg);
    border-radius: 8px;
}
.modal-img-container img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .nav-container {
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 20px;
    }
    .main-nav {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .top-bar-content {
        justify-content: center;
        text-align: center;
    }
}

.btn-whatsapp-nav {
    background-color: #25d366;
    color: #ffffff !important;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
}

.btn-whatsapp-nav:hover {
    background-color: #1ebc57;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
}
    </style>
</head>
<body>

    <div class="top-bar">

    <header class="main-header">
        <div class="container nav-container">
            <a href="index.html">

    <div class="container">
        <h1 class="page-title">Catálogo de Portátiles Reacondicionados</h1>
        <div id="contenedor-ordenadores" class="products-grid">
            <div class="loading-wrapper">
                <span class="material-symbols-outlined" style="font-size: 48px;">sync</span>
                <span>Cargando catálogo en tiempo real...</span>
            </div>
        </div>
    </div>

    <div id="modal-detalle" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="cerrarModal()">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div> 

    <script>
    // Variable global para almacenar el inventario limpio
    let productosData = [];

    // Parser de CSV ultra resistente a comillas y comas internas
    function CSVtoArray(text) {
        let p = '', c = '', r = [];
        let q = false;
        for (let i = 0; i < text.length; i++) {
            c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (q && next === '"') { p += '"'; i++; }
                else { q = !q; }
            } else if (c === ',' && !q) {
                r.push(p.trim());
                p = '';
            } else if ((c === '\r' || c === '\n') && !q) {
                if (c === '\r' && next === '\n') { i++; }
                r.push(p.trim());
                return r;
            } else {
                p += c;
            }
        }
        r.push(p.trim());
        return r;
    }

    function parsearCSVCompleto(csvText) {
        const lineas = csvText.split(/\r\n|\n|\r/);
        const resultado = [];
        for (let i = 1; i < lineas.length; i++) {
            if (!lineas[i].trim()) continue;
            const fila = CSVtoArray(lineas[i]);
            if (fila.length > 1) {
                resultado.push(fila);
            }
        }
        return resultado;
    }

    function escapeHTML(str) {
        if (!str) return '';
        return str
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    async function cargarOrdenadores() {
        const contenedor = document.getElementById('contenedor-ordenadores');
        if (!contenedor) return;

        try {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhexOU7t2maISL623crBt7fgi1OE1WpicKy-STdiB_wsc_XXtFufO8Ua8_1XXV3cXFg-eZha3mcgu/pub?gid=0&single=true&output=csv';
            
            const response = await fetch(url, { cache: 'no-cache' });
            if (!response.ok) throw new Error('Estado de respuesta: ' + response.status);
            
            const data = await response.text();
            const filas = parsearCSVCompleto(data);
            
            productosData = []; // Reiniciamos datos
            let htmlAcumulado = '';
            
            filas.forEach((col, index) => {
                const producto = {
                    marca: col[0] || 'Portátil',
                    modelo: col[1] || 'Reacondicionado',
                    pantalla: col[2] || 'Consultar',
                    cpu: col[3] || 'Consultar',
                    ram: col[4] || 'Consultar',
                    ssd: col[5] || 'Consultar',
                    so: col[6] || 'Consultar',
                    extra: col[7] || 'Sin observaciones',
                    precio: col[8] || 'Consultar',
                    imagen: col[9] ? col[9].trim() : ''
                };

                productosData.push(producto);

                // Tratamiento seguro de la imagen
                let imgHTML = '';
                if (producto.imagen && producto.imagen.toLowerCase().startsWith('http')) {
                    imgHTML = `<img src="${escapeHTML(producto.imagen)}" alt="${escapeHTML(producto.marca)} ${escapeHTML(producto.modelo)}" onerror="this.outerHTML='<span class=\\'material-symbols-outlined\\' style=\\'font-size:64px; color:#cbd5e1;\\'>laptop_chromebook</span>';">`;
                } else {
                    imgHTML = `<span class="material-symbols-outlined" style="font-size:64px; color:#cbd5e1;">laptop_chromebook</span>`;
                }

                htmlAcumulado += `
                <div class="product-card">
                    <div class="product-image-container">
                        ${imgHTML}
                    </div>
                    <h3>${escapeHTML(producto.marca)} ${escapeHTML(producto.modelo)}</h3>
                    <span class="product-price">${escapeHTML(producto.precio)}</span>
                    <div class="card-actions">
                        <a href="tel:955620607" class="btn-buy">Reservar</a>
                        <button onclick="abrirModal(${index})" class="btn-details">
                            + Detalles
                        </button>
                    </div>
                </div>`;
            });

            contenedor.innerHTML = htmlAcumulado || '<p style="text-align:center; grid-column: 1/-1;">No hay equipos cargados en la hoja de cálculo.</p>';

        } catch (err) {
            console.error("Error al cargar datos:", err);
            contenedor.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 30px; background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 8px;">
                    <p style="color:#d32f2f; font-weight:bold; font-size: 1.1rem;">⚠️ Hubo un problema al cargar la lista de ordenadores</p>
                    <p style="color:#555; margin-top:5px; font-size: 0.9rem;">Detalle: ${err.message}</p>
                </div>`;
        }
    }

    // Modal cargado por índice numérico
    function abrirModal(index) {
        const item = productosData[index];
        if (!item) return;

        const modal = document.getElementById('modal-detalle');
        const contenido = document.getElementById('contenido-modal');

        let imgModalHTML = '';
        if (item.imagen && item.imagen.toLowerCase().startsWith('http')) {
            imgModalHTML = `<div class="modal-img-container"><img src="${escapeHTML(item.imagen)}" alt="Imagen producto"></div>`;
        }

        contenido.innerHTML = `
            ${imgModalHTML}
            <h2 style="margin-bottom:15px; color: var(--dark);">${escapeHTML(item.marca)} ${escapeHTML(item.modelo)}</h2>
            <ul class="modal-specs-list">
                <li><strong>Pantalla:</strong> ${escapeHTML(item.pantalla)}</li>
                <li><strong>Procesador:</strong> ${escapeHTML(item.cpu)}</li>
                <li><strong>Memoria RAM:</strong> ${escapeHTML(item.ram)}</li>
                <li><strong>Disco SSD:</strong> ${escapeHTML(item.ssd)}</li>
                <li><strong>Sistema Operativo:</strong> ${escapeHTML(item.so)}</li>
                <li><strong>Observaciones:</strong> ${escapeHTML(item.extra)}</li>
                <li><strong>Precio:</strong> <span style="color:var(--primary); font-weight:bold;">${escapeHTML(item.precio)}</span></li>
            </ul>
            <a href="tel:955620607" class="btn-buy" style="display:block; padding:12px; margin-top:15px; text-align:center;">Reservar por teléfono</a>
        `;
        modal.style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modal-detalle').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modal-detalle');
        if (event.target === modal) cerrarModal();
    }

    document.addEventListener('DOMContentLoaded', cargarOrdenadores);
</script>
