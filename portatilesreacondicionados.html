<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Portátiles | Microdata Informática</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
/* ==========================================================================
   VARIABLES Y CONFIGURACIÓN CORPORATIVA
   ========================================================================== */
:root {
    --primary: #ff6600;        /* Naranja corporativo Microdata */
    --primary-hover: #e05500;
    --dark: #1e2229;           /* Gris técnico oscuro */
    --light-bg: #f8f9fa;       /* Fondo limpio */
    --border-color: #e9ecef;
    --text-main: #495057;
    --text-title: #212529;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    background-color: #ffffff;
    line-height: 1.6;
    background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
    background-size: 24px 24px;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
}

/* ==========================================================================
   TOP BAR & HEADER
   ========================================================================== */
.top-bar {
    background-color: var(--dark);
    color: #ffffff;
    font-size: 0.85rem;
    padding: 10px 0;
    border-bottom: 2px solid var(--primary);
}
.top-bar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}
.top-phone {
    color: #ffffff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: bold;
}

.main-header {
    background-color: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.02);
}
.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 80px;
}
.logo {
    height: 48px;
    width: auto;
    object-fit: contain;
}
.main-nav {
    display: flex;
    align-items: center;
    gap: 32px;
}
.nav-link {
    color: var(--text-title);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: var(--transition);
}
.nav-link:hover, .nav-link.active {
    color: var(--primary);
}
.btn-header {
    background-color: var(--dark);
    color: #ffffff;
    padding: 10px 20px;
    border-radius: 6px;
}
.btn-header:hover {
    background-color: var(--primary);
    color: #ffffff;
}

/* ==========================================================================
   CATÁLOGO & TARJETAS DE PRODUCTOS
   ========================================================================== */
.page-title {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--dark);
    margin: 40px 0 30px 0;
    position: relative;
    letter-spacing: -0.5px;
}
.page-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px; 
    background-color: var(--primary);
    margin: 12px auto 0;
    border-radius: 2px;
}

.products-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 30px; 
    margin: 30px auto 60px; 
    min-height: 300px;
    position: relative;
}

.product-card { 
    background: #ffffff;
    border-radius: 12px;
    padding: 20px; 
    transition: var(--transition);
    border: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
}
.product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow);
    border-color: transparent;
}

.product-image-container { 
    width: 100%;
    height: 180px;
    border-radius: 8px; 
    overflow: hidden;
    margin-bottom: 15px;
    background-color: var(--light-bg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.product-image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.product-card h3 {
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 8px;
    min-height: 2.6em;
    line-height: 1.3;
}

.product-price {
    color: var(--primary);
    font-weight: 800;
    font-size: 1.4rem;
    margin: 10px 0 15px 0;
    display: block;
}

.card-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
}

.btn-buy, .btn-details { 
    flex: 1;
    padding: 10px 12px;
    text-align: center; 
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.85rem;
    transition: var(--transition);
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-buy {
    background: var(--dark);
    color: #ffffff;
}
.btn-buy:hover {
    background: var(--primary-hover);
}

.btn-details {
    background: var(--primary);
    color: #ffffff;
}
.btn-details:hover {
    background: var(--primary-hover);
}

/* CARGANDO / SPINNER */
.loading-wrapper {
    grid-column: 1 / -1;
    text-align: center;
    font-weight: 700;
    color: var(--primary);
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 60px 0;
    animation: pulse-animation 1.5s infinite;
}
@keyframes pulse-animation {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* MODAL DETALLES */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(30, 34, 41, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal-content {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    cursor: pointer;
    font-size: 28px;
    color: var(--text-main);
    font-weight: bold;
}
.modal-close:hover {
    color: var(--primary);
}
.modal-specs-list {
    margin: 20px 0;
    list-style: none;
    line-height: 1.8;
}
.modal-specs-list li {
    padding: 6px 0;
    border-bottom: 1px dashed var(--border-color);
    font-size: 0.95rem;
}
.modal-specs-list li strong {
    color: var(--dark);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .nav-container {
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 20px;
    }
    .main-nav {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .top-bar-content {
        justify-content: center;
        text-align: center;
    }
}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container top-bar-content">
            <span>📍 C/ Malasmañas 100 y Plaza Almazara Local 4, Alcalá de Guadaíra (Sevilla)</span>
            <span>E-mail: info@microdatainformatica.com</span>
            <a href="tel:955620607" class="top-phone">
                <span class="material-symbols-outlined">phone</span> 955 620 607 / 645 766 208
            </a>
        </div>
    </div>

    <header class="main-header">
        <div class="container nav-container">
            <a href="index.html">
                <img src="https://cdn.website-editor.net/s/fab404f345eb4a4dab05b3716b4fea97/dms3rep/multi/logo+naranja+png.png" alt="Microdata Informática" class="logo">
            </a>
            
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Inicio</a>
                <a href="index.html#servicios" class="nav-link">Servicios</a>
                <a href="Reacondicionados.html" class="nav-link active">Reacondicionados</a>
                <a href="index.html#contacto" class="nav-link btn-header">Contacto</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Catálogo de Portátiles Reacondicionados</h1>
        <div id="contenedor-ordenadores" class="products-grid">
            <div class="loading-wrapper">
                <span class="material-symbols-outlined" style="font-size: 48px;">sync</span>
                <span>Cargando catálogo en tiempo real...</span>
            </div>
        </div>
    </div>

    <div id="modal-detalle" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="cerrarModal()">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div> 

    <script>
        // Función auxiliar para parsear líneas de CSV respetando comillas
        function parsearCSV(linea) {
            const valores = [];
            let valorActual = '';
            let dentroDeComillas = false;

            for (let i = 0; i < linea.length; i++) {
                const char = linea[i];
                if (char === '"' || char === "'") {
                    dentroDeComillas = !dentroDeComillas;
                } else if (char === ',' && !dentroDeComillas) {
                    valores.push(valorActual.trim().replace(/^["']|["']$/g, ''));
                    valorActual = '';
                } else {
                    valorActual += char;
                }
            }
            valores.push(valorActual.trim().replace(/^["']|["']$/g, ''));
            return valores;
        }

        async function cargarOrdenadores() {
            const contenedor = document.getElementById('contenedor-ordenadores');
            try {
                const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhexOU7t2maISL623crBt7fgi1OE1WpicKy-STdiB_wsc_XXtFufO8Ua8_1XXV3cXFg-eZha3mcgu/pub?gid=0&single=true&output=csv';
                const response = await fetch(url);
                if (!response.ok) throw new Error('No se pudo obtener el catálogo');
                
                const data = await response.text();
                const filas = data.split(/\r?\n/);
                
                let htmlAcumulado = '';
                
                for (let i = 1; i < filas.length; i++) {
                    if (!filas[i].trim()) continue;
                    
                    const col = parsearCSV(filas[i]);
                    
                    if (col.length < 9) continue;

                    const marca = col[0] || '';
                    const modelo = col[1] || '';
                    const pantalla = col[2] || 'N/A';
                    const cpu = col[3] || 'N/A';
                    const ram = col[4] || 'N/A';
                    const ssd = col[5] || 'N/A';
                    const so = col[6] || 'N/A';
                    const extra = col[7] || 'Sin observaciones extras';
                    const precio = col[8] || 'Consultar';
                    const imagen = col[9] ? col[9] : '';

                    const imgTag = imagen 
                        ? `<img src="${imagen}" alt="${marca} ${modelo}" onerror="this.src='https://via.placeholder.com/300x200?text=Port%C3%A1til+Microdata'">` 
                        : `<span class="material-symbols-outlined" style="font-size:64px; color:#cbd5e1;">laptop_chromebook</span>`;

                    // Sanitizamos parámetros para evitar fallos en el JavaScript del botón
                    const argsModal = [marca, modelo, pantalla, cpu, ram, ssd, so, extra]
                        .map(item => item.replace(/'/g, "\\'").replace(/"/g, '&quot;'));

                    htmlAcumulado += `
                    <div class="product-card">
                        <div class="product-image-container">
                            ${imgTag}
                        </div>
                        <h3>${marca} ${modelo}</h3>
                        <span class="product-price">${precio}</span>
                        <div class="card-actions">
                            <a href="tel:955620607" class="btn-buy">Reservar</a>
                            <button onclick="abrirModal('${argsModal.join("','")}')" class="btn-details">
                                + Detalles
                            </button>
                        </div>
                    </div>`;
                }

                if (htmlAcumulado === '') {
                    contenedor.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No hay productos disponibles en este momento.</p>';
                } else {
                    contenedor.innerHTML = htmlAcumulado;
                }

            } catch (err) {
                console.error("ERROR:", err);
                contenedor.innerHTML = '<p style="color:#e63946; text-align:center; grid-column: 1/-1; font-weight:bold;">Error al cargar el catálogo de Google Sheets. Revisa la conexión.</p>';
            }
        }

        cargarOrdenadores();

        function abrirModal(marca, modelo, pantalla, cpu, ram, ssd, so, extra) {
            const modal = document.getElementById('modal-detalle');
            const contenido = document.getElementById('contenido-modal');
            contenido.innerHTML = `
                <h2 style="margin-bottom:15px; color: var(--dark);">${marca} ${modelo}</h2>
                <ul class="modal-specs-list">
                    <li><strong>Pantalla:</strong> ${pantalla}</li>
                    <li><strong>Procesador:</strong> ${cpu}</li>
                    <li><strong>Memoria RAM:</strong> ${ram}</li>
                    <li><strong>Almacenamiento SSD:</strong> ${ssd}</li>
                    <li><strong>Sistema Operativo:</strong> ${so}</li>
                    <li><strong>Notas/Extras:</strong> ${extra}</li>
                </ul>
                <a href="tel:955620607" class="btn-buy" style="display:block; padding:12px; margin-top:15px;">Reservar por teléfono</a>
            `;
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal-detalle').style.display = 'none';
        }

        // Cerrar modal al hacer clic fuera del recuadro
        window.onclick = function(event) {
            const modal = document.getElementById('modal-detalle');
            if (event.target === modal) {
                cerrarModal();
            }
        }
    </script>
</body>
</html>
