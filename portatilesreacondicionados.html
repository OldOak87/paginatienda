<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Portátiles</title>
<style>
    :root { --primary: #ff6600; --dark: #1e2229; --light-bg: #f4f4f4; }

    body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); padding: 20px; }
    
    .products-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
        gap: 30px; 
        max-width: 1100px; 
        margin: 40px auto; 
    }

    .product-card { 
        background: #ffffff; 
        border-radius: 16px; 
        padding: 15px; 
        transition: 0.3s;
        border: 1px solid #eee;
        display: flex;
        flex-direction: column;
    }
    .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

    .product-image-container { 
        width: 100%; 
        height: 200px; /* Tamaño fijo pero elegante */
        border-radius: 12px; 
        overflow: hidden; 
        margin-bottom: 15px;
    }
    
    .product-image-container img { 
        width: 100%; 
        height: 100%; 
        object-fit: cover; /* Recorta la imagen para que rellene el hueco sin deformarse */
        transition: 0.5s;
    }

    h3 { font-size: 1.1rem; color: var(--dark); margin-bottom: 10px; min-height: 2.4em; }
    
    .specs { font-size: 0.85rem; color: #666; margin-bottom: auto; line-height: 1.4; }
    
    .product-price { 
        color: var(--primary); 
        font-weight: 800; 
        font-size: 1.5rem; 
        margin: 15px 0; 
        display: block; 
    }

    .btn-buy { 
        background: var(--dark); 
        color: white; 
        padding: 12px; 
        text-align: center; 
        border-radius: 8px; 
        text-decoration: none; 
        font-weight: bold; 
        transition: 0.3s;
    }
    .btn-buy:hover { background: var(--primary); }
</style>
</head>
<body>

    <div class="container">
        <h1>Nuestro Catálogo de Portátiles</h1>
        <div id="contenedor-ordenadores" class="products-grid">
            <div class="loading">Cargando catálogo...</div>
        </div>
    </div>
<script>
    async function cargarOrdenadores() {
        const contenedor = document.getElementById('contenedor-ordenadores');
        try {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhexOU7t2maISL623crBt7fgi1OE1WpicKy-STdiB_wsc_XXtFufO8Ua8_1XXV3cXFg-eZha3mcgu/pub?gid=0&single=true&output=csv';
            
            const response = await fetch(url);
            
            if (!response.ok) throw new Error('Error HTTP: ' + response.status);
            
            const data = await response.text();
            const filas = data.split('\n');
            
            let htmlAcumulado = '';
            // Empezamos en i=1 para saltar la cabecera
            for (let i = 1; i < filas.length; i++) {
                if (filas[i].trim() === "") continue;
                const col = filas[i].split(','); 
                
               htmlAcumulado += `
    <div class="product-card">
        <div class="product-image-container">
            <img src="${col[9].trim()}" alt="${col[1]}">
        </div>
        <h3>${col[0]} ${col[1]}</h3>
        <p style="font-size: 0.9rem; color: #666;">
            <strong>CPU:</strong> ${col[3]} | <strong>RAM:</strong> ${col[4]}<br>
            <strong>SSD:</strong> ${col[5]}
        </p>
        <span class="product-price">${col[8]}</span>
        <a href="tel:955620607" class="btn-buy">Reservar por teléfono</a>
    </div>`;
            }
            
            contenedor.innerHTML = htmlAcumulado;
            
        } catch (err) {
            console.error("ERROR:", err);
            contenedor.innerHTML = '<p style="color:red">Error en la carga: ' + err.message + '</p>';
        }
    }

    // Ejecutar la función al cargar la página
    cargarOrdenadores();
</script>
    
    
</body>
</html>
