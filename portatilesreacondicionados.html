<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Portátiles</title>
    <style>
/* ==========================================================================
   VARIABLES Y CONFIGURACIÓN CORPORATIVA (OPCIÓN 1: TECH HERO)
   ========================================================================== */
:root {
    --primary: #ff6600;        /* Naranja corporativo Microdata */
    --primary-hover: #e05500;
    --dark: #1e2229;           /* Gris técnico oscuro */
    --light-bg: #f8f9fa;       /* Fondo limpio */
    --border-color: #e9ecef;
    --text-main: #495057;
    --text-title: #212529;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    background-color: #ffffff;
    line-height: 1.6;
    background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
    background-size: 24px 24px; /* Sutil patrón de fondo de ingeniería */
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
}

/* ==========================================================================
   TOP BAR & HEADER
   ========================================================================== */
.top-bar {
    background-color: var(--dark);
    color: #ffffff;
    font-size: 0.85rem;
    padding: 10px 0;
    border-bottom: 2px solid var(--primary);
}
.top-bar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}
.top-phone {
    color: #ffffff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: bold;
}

.main-header {
    background-color: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.02);
}
.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 80px;
}
.logo {
    height: 48px;
    width: auto;
    object-fit: contain;
}
.main-nav {
    display: flex;
    align-items: center;
    gap: 32px;
}
.nav-link {
    color: var(--text-title);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: var(--transition);
}
.nav-link:hover, .nav-link.active {
    color: var(--primary);
}
.btn-header {
    background-color: var(--dark);
    color: #ffffff;
    padding: 10px 20px;
    border-radius: 6px;
}
.btn-header:hover {
    background-color: var(--primary);
    color: #ffffff;
}

/* ==========================================================================
   HERO SECTION
   ========================================================================== */
.hero {
    padding: 80px 0;
    background: linear-gradient(135deg, #ffffff 0%, var(--light-bg) 100%);
}
.hero-grid {
    display: grid;
    grid-template-columns: 1.2fr 0.8fr;
    gap: 60px;
    align-items: center;
}
.badge {
    background-color: rgba(255, 102, 0, 0.1);
    color: var(--primary);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 20px;
}
.hero-text h1 {
    font-size: 3.2rem;
    color: var(--dark);
    line-height: 1.2;
    margin-bottom: 20px;
    font-weight: 800;
}
.hero-text p {
    font-size: 1.15rem;
    margin-bottom: 36px;
    max-width: 600px;
}
.hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
}
.btn {
    padding: 14px 32px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 1rem;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    justify-content: center;
}
.btn-primary {
    background-color: var(--primary);
    color: #ffffff;
    box-shadow: 0 4px 14px rgba(255, 102, 0, 0.3);
}
.btn-primary:hover {
    background-color: var(--primary-hover);
    transform: translateY(-2px);
}
.btn-secondary {
    background-color: #ffffff;
    color: var(--dark);
    border: 2px solid var(--border-color);
}
.btn-secondary:hover {
    background-color: var(--light-bg);
    border-color: var(--dark);
}

/* Visual derecha del Hero */
.tech-card-visual {
    background: var(--dark);
    border-radius: 16px;
    height: 350px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
.tech-icon-large {
    font-size: 120px !important;
    color: rgba(255, 102, 0, 0.15);
}
.tech-badge {
    position: absolute;
    bottom: 30px;
    left: 30px;
    background-color: var(--primary);
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
}

/* ==========================================================================
   SECCIÓN SERVICIOS (GRID MODERNO)
   ========================================================================== */
.services-section {
    padding: 100px 0;
    background-color: #ffffff;
}
.section-title {
    text-align: center;
    margin-bottom: 60px;
}
.section-title h2 {
    font-size: 2.4rem;
    color: var(--dark);
    margin-bottom: 15px;
    font-weight: 700;
}
.services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
}
.service-card {
    background-color: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 40px 30px;
    position: relative;
    transition: var(--transition);
}
.service-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow);
    border-color: transparent;
}
.card-icon-wrapper {
    color: var(--primary);
    margin-bottom: 24px;
}
.card-icon-wrapper .material-symbols-outlined {
    font-size: 36px;
}
.service-card h3 {
    font-size: 1.4rem;
    color: var(--dark);
    margin-bottom: 15px;
    font-weight: 600;
}
.service-card p {
    font-size: 0.95rem;
    color: var(--text-main);
}

/* Variación Tarjeta Destacada Electrónica */
.service-card.highlighted {
    background-color: var(--dark);
    border-color: var(--dark);
}
.service-card.highlighted h3 {
    color: #ffffff;
}
.service-card.highlighted p {
    color: #a0aec0;
}
.service-card.highlighted .card-icon-wrapper {
    color: var(--primary);
}
.card-badge {
    position: absolute;
    top: 24px;
    right: 24px;
    background-color: var(--primary);
    color: #ffffff;
    font-size: 0.75rem;
    font-weight: bold;
    padding: 4px 10px;
    border-radius: 4px;
    text-transform: uppercase;
}

/* ==========================================================================
   RESPONSIVE (ADAPTACIÓN MÓVIL)
   ========================================================================== */
@media (max-width: 992px) {
    .hero-grid {
        grid-template-columns: 1fr;
        gap: 40px;
        text-align: center;
    }
    .hero-text h1 {
        font-size: 2.4rem;
    }
    .hero-text p {
        margin: 0 auto 30px;
    }
    .hero-actions {
        justify-content: center;
    }
    .tech-card-visual {
        height: 200px;
    }
}

@media (max-width: 768px) {
    .nav-container {
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 20px;
    }
    .main-nav {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .top-bar-content {
        justify-content: center;
        text-align: center;
    }
    .services-grid {
        grid-template-columns: 1fr;
    }
}

		
        :root { --primary: #ff6600; --dark: #1e2229; --light-bg: #f4f4f4; }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); padding: 20px; margin: 0; }
        
        .container { position: relative; min-height: 400px; max-width: 1100px; margin: 0 auto; }
        
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); 
            gap: 30px; 
            margin: 40px auto; 
        }

        .product-card { 
            background: #ffffff; border-radius: 16px; padding: 15px; 
            transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }

        .product-image-container { 
            width: 100%; height: 200px; border-radius: 12px; 
            overflow: hidden; margin-bottom: 15px; background-color: #eee;
        }
        
        .product-image-container img { width: 100%; height: 100%; object-fit: cover; }

        h3 { font-size: 1.1rem; color: var(--dark); margin-bottom: 10px; min-height: 2.4em; }
        
        .product-price { color: var(--primary); font-weight: 800; font-size: 1.5rem; margin: 15px 0; display: block; }

        .btn-buy { 
            background: var(--dark); color: white; padding: 12px; text-align: center; 
            border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-buy:hover { background: var(--primary); }

        .page-title {
            text-align: center; font-size: 2.5rem; font-weight: 800; color: var(--dark);
            margin: 60px 0 40px 0; position: relative; letter-spacing: -1px;
        }
        .page-title::after {
            content: ''; display: block; width: 60px; height: 4px; 
            background-color: var(--primary); margin: 15px auto 0; border-radius: 2px;
        }

        .loading-wrapper {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; font-weight: 800; color: var(--primary);
            font-size: 2rem; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px; width: 100%;
            animation: pulse-animation 1.5s infinite;
        }
        @keyframes pulse-animation {
            0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="container top-bar-content">
            <span>📍 C/ Malasmañas 100 y Plaza Almazara Local 4, Alcalá de Guadaíra (Sevilla)</span>
	    <span> E-mail: info@microdatainformatica.com</span>
            <a href="tel:955620607" class="top-phone"><span class="material-symbols-outlined">phone</span> 955 620 607 / 645 766 208</a>
        </div>
    </div>

    <header class="main-header">
        <div class="container nav-container">
            <img src="https://cdn.website-editor.net/s/fab404f345eb4a4dab05b3716b4fea97/dms3rep/multi/logo+naranja+png.png" alt="Microdata Informática" class="logo">
            
            <nav class="main-nav">
                <a href="#" class="nav-link active">Inicio</a>
                <a href="#servicios" class="nav-link">Servicios</a>
                <a href="Reacondicionados.html" class="nav-link">Reacondicionados</a>
                <a href="#contacto" class="nav-link btn-header">Contacto</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Nuestro Catálogo de Portátiles</h1>
        <div id="contenedor-ordenadores" class="products-grid">
            <div class="loading-wrapper">
                <span style="font-size: 4rem;">⚙️</span> <span>Cargando catálogo profesional...</span>
            </div>
        </div>
    </div>

    <script>
        async function cargarOrdenadores() {
            const contenedor = document.getElementById('contenedor-ordenadores');
            try {
                const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhexOU7t2maISL623crBt7fgi1OE1WpicKy-STdiB_wsc_XXtFufO8Ua8_1XXV3cXFg-eZha3mcgu/pub?gid=0&single=true&output=csv';
                const response = await fetch(url);
                if (!response.ok) throw new Error('Error HTTP: ' + response.status);
                
                const data = await response.text();
                const filas = data.split('\n');
                
                let htmlAcumulado = '';
                for (let i = 1; i < filas.length; i++) {
                    if (filas[i].trim() === "") continue;
                    const col = filas[i].split(','); 
                    
                    htmlAcumulado += `
                    <div class="product-card">
                        <div class="product-image-container">
                            <img src="${col[9].trim()}" alt="${col[1]}">
                        </div>
                        <h3>${col[0]} ${col[1]}</h3>
                        <span class="product-price">${col[8]}</span>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <a href="tel:955620607" class="btn-buy" style="flex:1; background:#1e2229;">Reservar</a>
                            <button onclick="abrirModal('${col[0].replace(/'/g, "\\'")}', '${col[1].replace(/'/g, "\\'")}', '${col[2].replace(/'/g, "\\'")}', '${col[3].replace(/'/g, "\\'")}', '${col[4].replace(/'/g, "\\'")}', '${col[5].replace(/'/g, "\\'")}', '${col[6].replace(/'/g, "\\'")}', '${col[7].replace(/'/g, "\\'")}')" 
                                    style="flex:1; background:#ff6600; color:white; border:none; border-radius:8px; cursor:pointer;">
                                + Detalles
                            </button>
                        </div>
                    </div>`;
                }
                contenedor.innerHTML = htmlAcumulado;
            } catch (err) {
                console.error("ERROR:", err);
                contenedor.innerHTML = '<p style="color:red; text-align:center; grid-column: 1/-1;">Error: ' + err.message + '</p>';
            }
        }

        cargarOrdenadores();

        function abrirModal(marca, modelo, pantalla, cpu, ram, ssd, so, extra) {
            const modal = document.getElementById('modal-detalle');
            const contenido = document.getElementById('contenido-modal');
            contenido.innerHTML = `
                <h2 style="margin-bottom:15px;">${marca} ${modelo}</h2>
                <ul style="margin:20px 0; list-style:none; line-height:2;">
                    <li><strong>Pantalla:</strong> ${pantalla}</li>
                    <li><strong>CPU:</strong> ${cpu}</li>
                    <li><strong>RAM:</strong> ${ram}</li>
                    <li><strong>SSD:</strong> ${ssd}</li>
                    <li><strong>S.O:</strong> ${so}</li>
                    <li><strong>Extras:</strong> ${extra}</li>
                </ul>
                <a href="tel:955620607" class="btn-buy" style="display:block;">Reservar ahora</a>
            `;
            modal.style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal-detalle').style.display = 'none';
        }
    </script>

    <div id="modal-detalle" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:12px; max-width:500px; width:90%; position:relative;">
            <span onclick="cerrarModal()" style="position:absolute; top:10px; right:20px; cursor:pointer; font-size:24px;">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div>   
</body>
</html>
