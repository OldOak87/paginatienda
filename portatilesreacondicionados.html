<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
/* ==========================================================================
   VARIABLES Y CONFIGURACIÓN CORPORATIVA
   ========================================================================== */
:root {
    --primary: #ff6600;        /* Naranja corporativo Microdata */
    --primary-hover: #e05500;
    --dark: #1e2229;           /* Gris técnico oscuro */
    --light-bg: #f8f9fa;       /* Fondo limpio */
    --border-color: #e9ecef;
    --text-main: #495057;
    --text-title: #212529;
    --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text-main);
    background-color: #ffffff;
    line-height: 1.6;
    background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
    background-size: 24px 24px;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
}

/* ==========================================================================
   TOP BAR & HEADER
   ========================================================================== */
.top-bar {
    background-color: var(--dark);
    color: #ffffff;
    font-size: 0.85rem;
    padding: 10px 0;
    border-bottom: 2px solid var(--primary);
}
.top-bar-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}
.top-phone {
    color: #ffffff;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: bold;
}

.main-header {
    background-color: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.02);
}
.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    height: 80px;
}
.logo {
    height: 48px;
    width: auto;
    object-fit: contain;
}
.main-nav {
    display: flex;
    align-items: center;
    gap: 32px;
}
.nav-link {
    color: var(--text-title);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: var(--transition);
}
.nav-link:hover, .nav-link.active {
    color: var(--primary);
}
.btn-header {
    background-color: var(--dark);
    color: #ffffff;
    padding: 10px 20px;
    border-radius: 6px;
}
.btn-header:hover {
    background-color: var(--primary);
    color: #ffffff;
}

/* ==========================================================================
   CATÁLOGO & TARJETAS DE PRODUCTOS
   ========================================================================== */
.page-title {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--dark);
    margin: 40px 0 30px 0;
    position: relative;
    letter-spacing: -0.5px;
}
.page-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 4px; 
    background-color: var(--primary);
    margin: 12px auto 0;
    border-radius: 2px;
}

.products-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
    gap: 30px; 
    margin: 30px auto 60px; 
    min-height: 300px;
    position: relative;
}

.product-card { 
    background: #ffffff;
    border-radius: 12px;
    padding: 20px; 
    transition: var(--transition);
    border: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
}
.product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow);
    border-color: transparent;
}

.product-image-container { 
    width: 100%;
    height: 180px;
    border-radius: 8px; 
    overflow: hidden;
    margin-bottom: 15px;
    background-color: var(--light-bg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.product-image-container img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.product-card h3 {
    font-size: 1.1rem;
    color: var(--dark);
    margin-bottom: 8px;
    min-height: 2.6em;
    line-height: 1.3;
}

.product-price {
    color: var(--primary);
    font-weight: 800;
    font-size: 1.4rem;
    margin: 10px 0 15px 0;
    display: block;
}

.card-actions {
    display: flex;
    gap: 10px;
    margin-top: auto;
}

.btn-buy, .btn-details { 
    flex: 1;
    padding: 10px 12px;
    text-align: center; 
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.85rem;
    transition: var(--transition);
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
}

.btn-buy {
    background: var(--dark);
    color: #ffffff;
}
.btn-buy:hover {
    background: var(--primary-hover);
}

.btn-details {
    background: var(--primary);
    color: #ffffff;
}
.btn-details:hover {
    background: var(--primary-hover);
}

/* CARGANDO / SPINNER */
.loading-wrapper {
    grid-column: 1 / -1;
    text-align: center;
    font-weight: 700;
    color: var(--primary);
    font-size: 1.2rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 60px 0;
    animation: pulse-animation 1.5s infinite;
}
@keyframes pulse-animation {
    0% { opacity: 0.4; }
    50% { opacity: 1; }
    100% { opacity: 0.4; }
}

/* MODAL DETALLES */
.modal-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(30, 34, 41, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal-content {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    cursor: pointer;
    font-size: 28px;
    color: var(--text-main);
    font-weight: bold;
}
.modal-close:hover {
    color: var(--primary);
}
.modal-specs-list {
    margin: 20px 0;
    list-style: none;
    line-height: 1.8;
}
.modal-specs-list li {
    padding: 6px 0;
    border-bottom: 1px dashed var(--border-color);
    font-size: 0.95rem;
}
.modal-specs-list li strong {
    color: var(--dark);
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .nav-container {
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 20px;
    }
    .main-nav {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .top-bar-content {
        justify-content: center;
        text-align: center;
    }
}

        .btn-whatsapp-nav {
    background-color: #25d366;
    color: #ffffff !important;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
}

.btn-whatsapp-nav:hover {
    background-color: #1ebc57;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
}
    </style>
</head>
<body>

    <header class="main-header">
        <div class="container nav-container">

    <div class="container">
        <h1 class="page-title">Catálogo de Portátiles Reacondicionados</h1>
        <div id="contenedor-ordenadores" class="products-grid">
            <div class="loading-wrapper">
                <span class="material-symbols-outlined" style="font-size: 48px;">sync</span>
                <span>Cargando catálogo en tiempo real...</span>
            </div>
        </div>
    </div>

    <div id="modal-detalle" class="modal-overlay">
        <div class="modal-content">
            <span class="modal-close" onclick="cerrarModal()">&times;</span>
            <div id="contenido-modal"></div>
        </div>
    </div> 

    <script>
    // Función de extracción ultra segura para CSV
    function parsearLineaCSV(linea) {
        const resultado = [];
        let dentroComillas = false;
        let campo = '';

        for (let i = 0; i < linea.length; i++) {
            const char = linea[i];

            if (char === '"' || char === "'") {
                dentroComillas = !dentroComillas;
            } else if (char === ',' && !dentroComillas) {
                resultado.push(campo.trim().replace(/^["']|["']$/g, ''));
                campo = '';
            } else {
                campo += char;
            }
        }
        resultado.push(campo.trim().replace(/^["']|["']$/g, ''));
        return resultado;
    }

    async function cargarOrdenadores() {
        const contenedor = document.getElementById('contenedor-ordenadores');
        if (!contenedor) return;

        try {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhexOU7t2maISL623crBt7fgi1OE1WpicKy-STdiB_wsc_XXtFufO8Ua8_1XXV3cXFg-eZha3mcgu/pub?gid=0&single=true&output=csv';
            
            // Añadimos cache: 'no-cache' para obtener los datos siempre actualizados
            const response = await fetch(url, { cache: 'no-cache' });
            if (!response.ok) throw new Error('No se pudo conectar con Google Sheets (Estado: ' + response.status + ')');
            
            const data = await response.text();
            
            // Limpiamos retornos de carro y dividimos por saltos de línea
            const filas = data.replace(/\r/g, '').split('\n');
            
            let htmlAcumulado = '';
            
            for (let i = 1; i < filas.length; i++) {
                const linea = filas[i].trim();
                if (!linea) continue; // Salta líneas vacías
                
                const col = parsearLineaCSV(linea);
                if (col.length < 2) continue; // Debe tener al menos marca o modelo

                // Asignación segura con valores por defecto
                const marca = (col[0] || 'Portátil').replace(/</g, "&lt;");
                const modelo = (col[1] || 'Reacondicionado').replace(/</g, "&lt;");
                const pantalla = (col[2] || 'Consultar').replace(/</g, "&lt;");
                const cpu = (col[3] || 'Consultar').replace(/</g, "&lt;");
                const ram = (col[4] || 'Consultar').replace(/</g, "&lt;");
                const ssd = (col[5] || 'Consultar').replace(/</g, "&lt;");
                const so = (col[6] || 'Consultar').replace(/</g, "&lt;");
                const extra = (col[7] || 'Sin observaciones').replace(/</g, "&lt;");
                const precio = (col[8] || 'Consultar').replace(/</g, "&lt;");
                const imagen = col[9] ? col[9].trim() : '';

                // Control de imagen
                let imgHTML = '';
                if (imagen && imagen.toLowerCase().startsWith('http')) {
                    imgHTML = `<img src="${imagen}" alt="${marca} ${modelo}" onerror="this.outerHTML='<span class=\\'material-symbols-outlined\\' style=\\'font-size:64px; color:#cbd5e1;\\'>laptop_chromebook</span>';">`;
                } else {
                    imgHTML = `<span class="material-symbols-outlined" style="font-size:64px; color:#cbd5e1;">laptop_chromebook</span>`;
                }

                // Limpiamos comillas dobles y simples para evitar fallos en la función del botón + Detalles
                const paramsModal = [marca, modelo, pantalla, cpu, ram, ssd, so, extra]
                    .map(val => val.replace(/'/g, "\\'").replace(/"/g, '&quot;'));

                htmlAcumulado += `
                <div class="product-card">
                    <div class="product-image-container">
                        ${imgHTML}
                    </div>
                    <h3>${marca} ${modelo}</h3>
                    <span class="product-price">${precio}</span>
                    <div class="card-actions">
                        <a href="tel:955620607" class="btn-buy">Reservar</a>
                        <button onclick="abrirModal('${paramsModal.join("','")}')" class="btn-details">
                            + Detalles
                        </button>
                    </div>
                </div>`;
            }

            contenedor.innerHTML = htmlAcumulado || '<p style="text-align:center; grid-column: 1/-1;">No hay equipos cargados en la hoja de cálculo.</p>';

        } catch (err) {
            console.error("Error detectado:", err);
            contenedor.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 30px; background: #fff3f3; border: 1px solid #ffcdd2; border-radius: 8px;">
                    <p style="color:#d32f2f; font-weight:bold; font-size: 1.1rem;">⚠️ Hubo un problema al cargar la lista de ordenadores</p>
                    <p style="color:#555; margin-top:5px; font-size: 0.9rem;">Detalle: ${err.message}</p>
                </div>`;
        }
    }

    // Modal de especificaciones
    function abrirModal(marca, modelo, pantalla, cpu, ram, ssd, so, extra) {
        const modal = document.getElementById('modal-detalle');
        const contenido = document.getElementById('contenido-modal');
        contenido.innerHTML = `
            <h2 style="margin-bottom:15px; color: var(--dark);">${marca} ${modelo}</h2>
            <ul class="modal-specs-list">
                <li><strong>Pantalla:</strong> ${pantalla}</li>
                <li><strong>Procesador:</strong> ${cpu}</li>
                <li><strong>Memoria RAM:</strong> ${ram}</li>
                <li><strong>SSD:</strong> ${ssd}</li>
                <li><strong>Sistema Operativo:</strong> ${so}</li>
                <li><strong>Observaciones:</strong> ${extra}</li>
            </ul>
            <a href="tel:955620607" class="btn-buy" style="display:block; padding:12px; margin-top:15px; text-align:center;">Reservar por teléfono</a>
        `;
        modal.style.display = 'flex';
    }

    function cerrarModal() {
        document.getElementById('modal-detalle').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modal-detalle');
        if (event.target === modal) cerrarModal();
    }

    // Forzamos el inicio de carga en cuanto la página esté lista
    document.addEventListener('DOMContentLoaded', cargarOrdenadores);
    // Ejecución directa de respaldo por si el evento ya sucedió
    cargarOrdenadores();
</script>
