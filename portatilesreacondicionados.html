<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Portátiles</title>
<style>
    :root { --primary: #ff6600; --dark: #1e2229; --light-bg: #f8f9fa; --border-color: #e9ecef; }

    body { font-family: 'Segoe UI', sans-serif; background-color: var(--light-bg); padding: 40px 20px; }
    
    .products-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 25px; 
        max-width: 1200px; 
        margin: 0 auto; 
    }

    .product-card { 
        background: #ffffff; 
        border-radius: 12px; 
        padding: 20px; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        transition: transform 0.2s;
        border: 1px solid var(--border-color);
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

    .product-image-container { 
        width: 100%; 
        height: 180px; 
        overflow: hidden; 
        border-radius: 8px; 
        margin-bottom: 15px; 
        background-color: #eee;
    }
    .product-image-container img { 
        width: 100%; 
        height: 100%; 
        object-fit: contain; /* Esto evita que se deforme o sea gigante */
    }

    h3 { color: var(--dark); margin-bottom: 10px; font-size: 1.2rem; }
    .product-price { color: var(--primary); font-weight: bold; font-size: 1.4rem; margin-top: 15px; display: block; }
    .btn-buy { background: var(--primary); color: white; padding: 10px; text-align: center; border-radius: 6px; text-decoration: none; display: block; margin-top: 10px; }
</style>
</head>
<body>

    <div class="container">
        <h1>Nuestro Catálogo de Portátiles</h1>
        <div id="contenedor-ordenadores" class="products-grid">
            <div class="loading">Cargando catálogo...</div>
        </div>
    </div>
<script>
    async function cargarOrdenadores() {
        const contenedor = document.getElementById('contenedor-ordenadores');
        try {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhexOU7t2maISL623crBt7fgi1OE1WpicKy-STdiB_wsc_XXtFufO8Ua8_1XXV3cXFg-eZha3mcgu/pub?gid=0&single=true&output=csv';
            
            const response = await fetch(url);
            
            if (!response.ok) throw new Error('Error HTTP: ' + response.status);
            
            const data = await response.text();
            const filas = data.split('\n');
            
            let htmlAcumulado = '';
            // Empezamos en i=1 para saltar la cabecera
            for (let i = 1; i < filas.length; i++) {
                if (filas[i].trim() === "") continue;
                const col = filas[i].split(','); 
                
               htmlAcumulado += `
    <div class="product-card">
        <div class="product-image-container">
            <img src="${col[9].trim()}" alt="${col[1]}">
        </div>
        <h3>${col[0]} ${col[1]}</h3>
        <p style="font-size: 0.9rem; color: #666;">
            <strong>CPU:</strong> ${col[3]} | <strong>RAM:</strong> ${col[4]}<br>
            <strong>SSD:</strong> ${col[5]}
        </p>
        <span class="product-price">${col[8]}</span>
        <a href="tel:955620607" class="btn-buy">Reservar por teléfono</a>
    </div>`;
            }
            
            contenedor.innerHTML = htmlAcumulado;
            
        } catch (err) {
            console.error("ERROR:", err);
            contenedor.innerHTML = '<p style="color:red">Error en la carga: ' + err.message + '</p>';
        }
    }

    // Ejecutar la función al cargar la página
    cargarOrdenadores();
</script>
    
    
</body>
</html>
